<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - ScoreQuanta Admin</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        .latex-help { font-size: 0.82rem; color: #6b7280; margin-bottom: 8px; line-height: 1.5; }
        .latex-help code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px; font-size: 0.8rem; }
        textarea.latex-input { min-height: 180px; font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace; font-size: 0.9rem; line-height: 1.6; }
        .preview-box { background: #fafafa; border: 1px solid #e5e7eb; border-radius: 6px; padding: 16px 20px; margin-top: 8px; min-height: 48px; font-size: 1rem; line-height: 1.7; color: #111827; }
        .preview-label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 10px; margin-bottom: 4px; }
        input.latex-input-sm { font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add Question</h1>
        <p><a href="/admin" style="color: #555; font-size: 0.9rem;">Back to Admin Dashboard</a></p>

        {% if request.query_params.get('success') %}
        <div class="success-msg">Question added successfully.</div>
        {% endif %}

        <form method="POST" action="/admin/add-question">
            <div class="form-group">
                <label>Question Text</label>
                <div class="latex-help">
                    Supports LaTeX. Use <code>\( ... \)</code> for inline math, <code>$$ ... $$</code> for display equations.
                </div>
                <textarea name="question_text" class="latex-input" id="questionText" required placeholder="What is the value of \(x^2 + 5x + 6\) when \(x = 3\)?"></textarea>
                <div class="preview-label">Live Preview</div>
                <div class="preview-box" id="questionPreview"></div>
            </div>

            <div class="form-group">
                <label>Option A</label>
                <input type="text" name="option_a" class="latex-input-sm" data-preview="previewA" required placeholder="\(x = 5\)">
                <div class="preview-box" id="previewA" style="margin-top:4px; min-height:32px; padding:10px 16px;"></div>
            </div>

            <div class="form-group">
                <label>Option B</label>
                <input type="text" name="option_b" class="latex-input-sm" data-preview="previewB" required placeholder="\(x = 7\)">
                <div class="preview-box" id="previewB" style="margin-top:4px; min-height:32px; padding:10px 16px;"></div>
            </div>

            <div class="form-group">
                <label>Option C</label>
                <input type="text" name="option_c" class="latex-input-sm" data-preview="previewC" required placeholder="\(x = 30\)">
                <div class="preview-box" id="previewC" style="margin-top:4px; min-height:32px; padding:10px 16px;"></div>
            </div>

            <div class="form-group">
                <label>Option D</label>
                <input type="text" name="option_d" class="latex-input-sm" data-preview="previewD" required placeholder="\(x = 42\)">
                <div class="preview-box" id="previewD" style="margin-top:4px; min-height:32px; padding:10px 16px;"></div>
            </div>

            <div class="form-group">
                <label>Correct Answer (A, B, C, or D)</label>
                <select name="correct_answer" required>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>

            <div class="form-group">
                <label>Concept (e.g., algebra, geometry, statistics)</label>
                <input type="text" name="concept" required>
            </div>

            <div class="form-group">
                <label>Difficulty</label>
                <select name="difficulty" required>
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>

            <div class="form-group">
                <label>Ideal Time (seconds)</label>
                <input type="number" name="ideal_time_seconds" value="90" required min="10" max="600">
            </div>

            <div class="form-group">
                <label>Trap Type (optional)</label>
                <input type="text" name="trap_type" placeholder="e.g., sign_error, unit_conversion, off_by_one">
            </div>

            <div class="form-group">
                <label>Numeric Answer (optional, for precision detection)</label>
                <input type="number" step="any" name="numeric_answer" placeholder="e.g., 42.5">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;">Add Question</button>
        </form>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const katexDelimiters = [
            {left: "$$", right: "$$", display: true},
            {left: "\\(", right: "\\)", display: false}
        ];

        function updatePreview(sourceEl, targetId) {
            const target = document.getElementById(targetId);
            if (!target) return;
            target.innerHTML = sourceEl.value || '';
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(target, { delimiters: katexDelimiters });
            }
        }

        const questionText = document.getElementById('questionText');
        if (questionText) {
            questionText.addEventListener('input', function () {
                updatePreview(this, 'questionPreview');
            });
        }

        document.querySelectorAll('input[data-preview]').forEach(function (input) {
            input.addEventListener('input', function () {
                updatePreview(this, this.dataset.preview);
            });
        });
    });
    </script>
</body>
</html>
