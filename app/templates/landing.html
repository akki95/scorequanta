<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Math Intelligence Test</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="landing-page">
            <h1>15-Minute SAT Math Intelligence Test</h1>
            <p class="subtitle">Predict your SAT score. Discover the fastest path to +100 points.</p>
            <a href="/test" class="btn-primary" id="startBtn">Start Test</a>
            <div id="noQuestions" style="display:none; margin-top: 20px;">
                <p style="color: #b22222; font-size: 0.9rem;">No questions are available at this time. Please check back later.</p>
            </div>
        </div>
    </div>
    <script>
        fetch('/api/questions/count')
            .then(r => r.json())
            .then(data => {
                if (data.count === 0) {
                    document.getElementById('noQuestions').style.display = 'block';
                    document.getElementById('startBtn').style.display = 'none';
                }
            });
    </script>
</body>
</html>
